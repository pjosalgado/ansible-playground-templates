- name: Ping and notifies to Discord
  hosts: all
  tasks:
    - name: Ping my hosts
      ansible.builtin.ping:
    - name: Send message to Discord
      uri:
        url: "{{DISCORD_WEBHOOK}}"
        method: POST
        body_format: json
        body: '{"content": "{{DISCORD_MESSAGE}}"}'
        headers:
          Content-Type: application/json
        status_code: 204
